<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="stylesheet.css" />
    <title>Carpe Diem</title>
</head>
<body>
    <header class="header-row">
        <div class="header-left">
            <div class="settings-icon">
                <img src="" alt="a gearhead settings icon">
            </div>
        </div>
        <div class="header-center">
            <h1>Carpe Diem</h1>  
        </div>
        <div class="header-right">
            <div class="profile-icon">
                <img src="" alt="a silhoette icon for personal profile">
            </div>
        </div>
    </header>

    <section class="top-section"> 
        <div class="left-dashboard card">
            <div class="left-dashboard-title">
                <p><strong>Completion Stats</strong></p>
            </div>
            <div class="completion-graph">
                <p>Completion graph goes here</p>
            </div>
        </div>

        <div class="center-dashboard card">
            <div class="center-dashboard-title">
                <p><strong>Progress Visualizer</strong></p>
            </div>
            <div class="progress-graph">
                <p>Progress graph goes here</p>
            </div>
        </div>

        <div class="right-dashboard card">
            <div class="right-dashboard-title">
                <p><strong>Habit Stats</strong></p>
            </div>
            <div class="habit-graph">
                <p>Habit graph goes here</p>
            </div>
        </div>



    </section>
</body>
</html>
